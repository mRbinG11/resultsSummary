<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Results Summary</title>
</head>

<body>
    <div class="container">
        <div class="main">
            <!-- Left Section -->
            <div class="left">
                <h2>Your Result</h2>
                <div class="score">76
                    <p>of 100</p>
                </div>
                <div class="conclusion">
                    <p><strong>Great</strong></p>
                    <p>you scored higher than 65% of the people who have taken these tests</p>
                </div>
            </div>

            <!-- Right Section -->
            <div class="right">
                <h3>Summary</h3>
                <div class="category">⚡ Reaction <span><strong>80</strong> / 100</span></div>
                <div class="category">🧠 Memory <span><strong>92</strong> / 100</span></div>
                <div class="category">💬 Verbal <span><strong>61</strong> / 100</span></div>
                <div class="category">👁️ Visual <span><strong>72</strong> / 100</span></div>
                <a href="#" class="button">Continue</a>
            </div>
        </div>
    </div>
    <footer>
        <div class="attribution">
            Challenge by <a href="https://www.crio.do">Crio.</a>
            Coded by <a href="https://github.com/mRbinG11">Sujith</a>
        </div>
    </footer>
</body>

</html>
